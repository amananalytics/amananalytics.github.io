<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="barGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4891A"/>
      <stop offset="100%" stop-color="#8B3A1A"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00C4D4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1B2A7A"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4891A"/>
      <stop offset="100%" stop-color="#D4891A" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Bar Chart Base -->
  <!-- Bar 1 (short) -->
  <rect x="80" y="148" width="28" height="52" rx="2" fill="url(#barGrad3)" opacity="0.85"/>
  <!-- Bar 2 (medium) -->
  <rect x="116" y="118" width="28" height="82" rx="2" fill="url(#barGrad1)" opacity="0.9"/>
  <!-- Bar 3 (tall) -->
  <rect x="152" y="88" width="28" height="112" rx="2" fill="url(#barGrad2)" opacity="0.9"/>
  <!-- Bar 4 (medium-tall) -->
  <rect x="188" y="108" width="28" height="92" rx="2" fill="url(#barGrad1)" opacity="0.75"/>

  <!-- X Axis -->
  <line x1="72" y1="202" x2="240" y2="202" stroke="#00C4D4" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow on X axis -->
  <polygon points="240,197 250,202 240,207" fill="#00C4D4"/>

  <!-- Y Axis -->
  <line x1="72" y1="202" x2="72" y2="70" stroke="#00C4D4" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow on Y axis -->
  <polygon points="67,70 72,60 77,70" fill="#00C4D4"/>

  <!-- Trend line / network overlay -->
  <!-- Nodes -->
  <circle cx="94" cy="155" r="5" fill="#00C4D4" stroke="#0B1A2A" stroke-width="1.5"/>
  <circle cx="130" cy="128" r="5" fill="#00C4D4" stroke="#0B1A2A" stroke-width="1.5"/>
  <circle cx="166" cy="98" r="5" fill="#D4891A" stroke="#0B1A2A" stroke-width="1.5"/>
  <circle cx="202" cy="112" r="5" fill="#00C4D4" stroke="#0B1A2A" stroke-width="1.5"/>
  <circle cx="235" cy="78" r="5" fill="#D4891A" stroke="#0B1A2A" stroke-width="1.5"/>

  <!-- Lines between nodes -->
  <polyline points="94,155 130,128 166,98 202,112 235,78"
    fill="none" stroke="#00C4D4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Arrow at end of trend -->
  <polygon points="230,72 242,75 233,83" fill="#D4891A"/>

  <!-- Text: AMAN -->
  <text x="80" y="250"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="42"
    font-weight="900"
    letter-spacing="-1"
    fill="#0D1B2A">AMAN</text>

  <!-- Text: ANALYTICS -->
  <text x="83" y="275"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="16"
    font-weight="400"
    letter-spacing="6"
    fill="#00C4D4">ANALYTICS</text>
</svg>
